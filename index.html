<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Professional feedback survey form designed to gather recruiter and HR insights." />
  <meta name="author" content="Hanna Kwas" />
  <title>Professional Feedback Survey</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main>
<div class="theme-toggle-container">
  <label class="theme-toggle">
    <input type="checkbox" id="darkModeToggle">
    <span class="slider"></span>
  </label>
</div>
<section id="feedback" class="feedback-section">
  <div class="container">
    <h2>Professional Feedback Survey</h2>
    <p>We value your insights! Please take a moment to share your feedback on my portfolio and experience.</p>
<form 
  id="survey-form"
  action="https://formspree.io/f/xgedeoel"
  method="POST"
  novalidate>

  <label for="name">Full Name</label>
      <input 
        type="text" 
        id="name" 
        name="name" 
        placeholder="Your name"
        required
      >

      <label for="email">Email</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        placeholder="Your email"
        required
      >

      <label for="role">Who are you?</label>
      <select id="role" name="role" required>
        <option value="">Select</option>
        <option value="recruiter">Recruiter</option>
        <option value="developer">Developer</option>
        <option value="HR Manager">HR Manager</option>
        <option value="Technical Lead">Technical Lead</option>
        <option value="Executive">Executive</option>
        <option value="visitor">General Visitor</option>
      </select>

      <label for="rating">Rate my portfolio</label>
      <select id="rating" name="rating" required>
        <option value="">Select rating</option>
        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
        <option value="4">⭐⭐⭐⭐ Very Good</option>
        <option value="3">⭐⭐⭐ Good</option>
        <option value="2">⭐⭐ Fair</option>
        <option value="1">⭐ Needs Improvement</option>
      </select>

      <label>Are you interested in hiring or contacting me?</label>

      <div class="radio-group">
        <label>
          <input type="radio" name="hire" value="yes" required>
          Yes
        </label>

        <label>
          <input type="radio" name="hire" value="maybe">
          Maybe
        </label>

        <label>
          <input type="radio" name="hire" value="no">
          No
        </label>
      </div>

      <label for="message">Message / Feedback</label>
      <textarea 
        id="message" 
        name="message"
        placeholder="Share feedback or hiring details..."
      ></textarea>

      <button type="submit">Send Feedback</button>

    </form>

    <p id="form-message"></p>

  </div>
</section>
<script>
  const toggle = document.getElementById("darkModeToggle");

  // Load saved preference
  if (localStorage.getItem("darkMode") === "enabled") {
    document.body.classList.add("dark-mode");
    toggle.checked = true;
  }

  toggle.addEventListener("change", () => {
    if (toggle.checked) {
      document.body.classList.add("dark-mode");
      localStorage.setItem("darkMode", "enabled");
    } else {
      document.body.classList.remove("dark-mode");
      localStorage.setItem("darkMode", "disabled");
    }
  });

  // Handle form submission feedback
document.getElementById("survey-form").addEventListener("submit", function(e){
  e.preventDefault();

  const message = document.getElementById("form-message");
  message.textContent = "Thank you! Your feedback has been received.";
  message.style.color = "green";

  this.reset();
});
</script>
</body>
</html>
